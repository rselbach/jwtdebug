version: "2"

linters:
  enable:
    - errcheck
    - errname
    - gocritic
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (*os.File).Close
        - io.Copy
        - os.RemoveAll
        - os.Remove

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofmt:
      simplify: true
