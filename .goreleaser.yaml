# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - cargo fetch --locked

builds:
  - id: linux
    builder: rust
    binary: jwtdebug
    command: zigbuild
    flags:
      - --release
    env:
      - JWTDEBUG_VERSION={{ .Version }}
      - JWTDEBUG_COMMIT={{ .ShortCommit }}
      - JWTDEBUG_BUILD_DATE={{ .Date }}
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    hooks:
      post:
        - cmd: ./scripts/build-appimage.sh "{{ .Path }}" "{{ .ProjectName }}" "{{ .Version }}"

  - id: default
    builder: rust
    binary: jwtdebug
    command: zigbuild
    flags:
      - --release
    env:
      - JWTDEBUG_VERSION={{ .Version }}
      - JWTDEBUG_COMMIT={{ .ShortCommit }}
      - JWTDEBUG_BUILD_DATE={{ .Date }}
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin
      - x86_64-pc-windows-gnu

brews:
  - homepage: https://github.com/rselbach/jwtdebug
    license: MIT
    description: >-
      A command line tool to decode, verify and generate JWTs (JSON Web Tokens).
    repository:
      owner: rselbach
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    download_strategy: CurlDownloadStrategy
    test: |
      system "#{bin}/jwtdebug --version"

archives:
  - id: default
    ids:
      - linux
      - default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - id: jwtdebug
    package_name: jwtdebug
    homepage: https://github.com/rselbach/jwtdebug
    maintainer: Roberto Selbach <r@selbach.dev>
    license: MIT
    description: >-
      A command line tool to decode, verify and generate JWTs (JSON Web Tokens).
    formats:
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    contents:
      - src: docs/jwtdebug.1
        dst: /usr/share/man/man1/jwtdebug.1
        file_info:
          mode: 0644

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
  replace_existing_draft: true
  mode: replace
